version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_MULTIPLE_DATABASES: user_db,product_db,order_db,payment_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      # To support multiple databases, we can use a custom script or just manual creation.
      # For simplicity in this demo, I'll use a single DB and separate schemas if needed, 
      # but the user asked for "for each service". 
      # A better way is to use a script in docker-entrypoint-initdb.d/
    networks:
      - ecommerce-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - ecommerce-network

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ecommerce-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - ecommerce-network

  user-service:
    build: ./user-service
    restart: always
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/user_db?schema=public
      - KAFKA_BROKER=kafka:9092
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - kafka
      - redis
    networks:
      - ecommerce-network
    volumes:
      - ./user-service/src:/app/src

  product-service:
    build: ./product-service
    restart: always
    ports:
      - "4001:4001"
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/product_db?schema=public
      - KAFKA_BROKER=kafka:9092
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - kafka
      - redis
    networks:
      - ecommerce-network
    volumes:
      - ./product-service/src:/app/src

  order-service:
    build: ./order-service
    restart: always
    ports:
      - "4002:4002"
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/order_db?schema=public
      - KAFKA_BROKER=kafka:9092
      - REDIS_URL=redis://redis:6379
      - PRODUCT_SERVICE_URL=http://product-service:4001
    depends_on:
      - postgres
      - kafka
      - redis
    networks:
      - ecommerce-network
    volumes:
      - ./order-service/src:/app/src

  payment-service:
    build: ./payment-service
    restart: always
    ports:
      - "4003:4003"
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/payment_db?schema=public
      - KAFKA_BROKER=kafka:9092
      - REDIS_URL=redis://redis:6379
      - ORDER_SERVICE_URL=http://order-service:4002
    depends_on:
      - postgres
      - kafka
      - redis
    networks:
      - ecommerce-network
    volumes:
      - ./payment-service/src:/app/src

networks:
  ecommerce-network:
    driver: bridge

volumes:
  postgres_data:
